<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teaven Pay - 管理后台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/fonts/remixicon.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
    <style>
        /* CSS 变量 */
        :root {
            /* 主题色 */
            --primary-50: #fffbeb;
            --primary-100: #fef3c7;
            --primary-200: #fde68a;
            --primary-300: #fcd34d;
            --primary-400: #fbbf24;
            --primary-500: #f59e0b;
            --primary-600: #d97706;
            --primary-700: #b45309;
            --primary-800: #92400e;
            --primary-900: #78350f;

            /* 状态色 */
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --info: #3b82f6;
            --default: #6b7280;

            /* 中性色 */
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;

            /* 亮色模式 */
            --bg-primary: #ffffff;
            --bg-secondary: #f9fafb;
            --bg-tertiary: #f3f4f6;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --text-tertiary: #9ca3af;
            --border-color: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);

            /* 布局 */
            --sidebar-width: 240px;
            --sidebar-collapsed-width: 64px;
            --header-height: 56px;
        }

        /* 深色模式 */
        [data-theme="dark"] {
            --bg-primary: #111827;
            --bg-secondary: #1f2937;
            --bg-tertiary: #374151;
            --text-primary: #f9fafb;
            --text-secondary: #d1d5db;
            --text-tertiary: #9ca3af;
            --border-color: #374151;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
        }

        /* 基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.5;
            font-size: 14px;
        }

        /* 布局 */
        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* 侧边栏 */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-primary);
            border-right: 1px solid var(--border-color);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            transition: width 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .sidebar.collapsed {
            width: var(--sidebar-collapsed-width);
        }

        .sidebar-header {
            height: var(--header-height);
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 16px;
        }

        .sidebar-logo i {
            font-size: 24px;
            color: var(--primary-500);
        }

        .sidebar.collapsed .sidebar-logo span {
            display: none;
        }

        .sidebar-nav {
            flex: 1;
            padding: 12px 8px;
            overflow-y: auto;
        }

        .nav-section {
            margin-bottom: 24px;
        }

        .nav-section-title {
            padding: 0 12px;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .sidebar.collapsed .nav-section-title {
            display: none;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            margin-bottom: 2px;
            border-radius: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .nav-item:hover {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .nav-item.active {
            background-color: var(--primary-50);
            color: var(--primary-600);
        }

        [data-theme="dark"] .nav-item.active {
            background-color: rgba(245, 158, 11, 0.1);
        }

        .nav-item i {
            font-size: 18px;
            width: 24px;
            margin-right: 12px;
        }

        .sidebar.collapsed .nav-item i {
            margin-right: 0;
        }

        .sidebar.collapsed .nav-item span {
            display: none;
        }

        .nav-item .badge {
            margin-left: auto;
            background-color: var(--error);
            color: white;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 10px;
        }

        .sidebar.collapsed .nav-item .badge {
            display: none;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            transition: margin-left 0.3s ease;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .sidebar.collapsed ~ .main-content {
            margin-left: var(--sidebar-collapsed-width);
        }

        /* 头部 */
        .header {
            height: var(--header-height);
            background-color: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .sidebar-toggle {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-toggle:hover {
            background-color: var(--bg-tertiary);
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .breadcrumb a {
            color: var(--text-tertiary);
            text-decoration: none;
        }

        .breadcrumb a:hover {
            color: var(--text-primary);
        }

        .breadcrumb .separator {
            color: var(--text-tertiary);
        }

        .breadcrumb .current {
            color: var(--text-primary);
            font-weight: 500;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle:hover {
            background-color: var(--bg-tertiary);
        }

        .user-menu {
            position: relative;
        }

        .user-menu-button {
            display: flex;
            align-items: center;
            gap: 8px;
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 6px;
        }

        .user-menu-button:hover {
            background-color: var(--bg-tertiary);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: var(--primary-500);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
        }

        .user-menu-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 0;
            min-width: 160px;
            box-shadow: var(--shadow-lg);
            display: none;
            z-index: 100;
        }

        .user-menu:hover .user-menu-dropdown {
            display: block;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: background-color 0.2s ease;
        }

        .dropdown-item:hover {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
        }

        /* 内容区 */
        .content {
            flex: 1;
            padding: 24px;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .page-actions {
            display: flex;
            gap: 12px;
        }

        /* 组件样式 */
        .card {
            background-color: var(--bg-primary);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .card-body {
            padding: 20px;
        }

        .card-footer {
            padding: 12px 20px;
            border-top: 1px solid var(--border-color);
            background-color: var(--bg-secondary);
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background-color: var(--bg-primary);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            padding: 20px;
            box-shadow: var(--shadow-sm);
        }

        .stat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .stat-label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .stat-icon.green {
            background-color: var(--primary-100);
            color: var(--primary-600);
        }

        .stat-icon.blue {
            background-color: #dbeafe;
            color: #2563eb;
        }

        .stat-icon.yellow {
            background-color: #fef3c7;
            color: #d97706;
        }

        .stat-icon.purple {
            background-color: #ede9fe;
            color: #7c3aed;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .stat-change {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
        }

        .stat-change.up {
            color: var(--success);
        }

        .stat-change.down {
            color: var(--error);
        }

        /* 表格 */
        .table-container {
            overflow-x: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            padding: 12px 16px;
            text-align: left;
            font-weight: 500;
            color: var(--text-secondary);
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }

        .data-table td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }

        .data-table tr:hover {
            background-color: var(--bg-secondary);
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        /* 状态标签 */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge.success {
            background-color: #dcfce7;
            color: #166534;
        }

        .badge.warning {
            background-color: #fef3c7;
            color: #92400e;
        }

        .badge.error {
            background-color: #fee2e2;
            color: #991b1b;
        }

        .badge.info {
            background-color: #dbeafe;
            color: #1e40af;
        }

        .badge.default {
            background-color: #f3f4f6;
            color: #374151;
        }

        [data-theme="dark"] .badge.success {
            background-color: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }

        [data-theme="dark"] .badge.warning {
            background-color: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        [data-theme="dark"] .badge.error {
            background-color: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        [data-theme="dark"] .badge.info {
            background-color: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        [data-theme="dark"] .badge.default {
            background-color: rgba(107, 114, 128, 0.2);
            color: #9ca3af;
        }

        /* 按钮 */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .btn-primary {
            background-color: var(--primary-500);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-600);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-primary);
            border-color: var(--border-color);
        }

        .btn-secondary:hover {
            background-color: var(--bg-tertiary);
        }

        .btn-danger {
            background-color: var(--error);
            color: white;
        }

        .btn-danger:hover {
            background-color: #dc2626;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn-lg {
            padding: 12px 24px;
            font-size: 16px;
        }

        .btn-icon {
            padding: 8px;
        }

        /* 表单 */
        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .form-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-size: 14px;
            transition: border-color 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }

        .form-input::placeholder {
            color: var(--text-tertiary);
        }

        .form-select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23343a40' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M2 5l6 6 6-6'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 12px 12px;
            padding-right: 36px;
        }

        .form-textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-hint {
            margin-top: 4px;
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .form-error {
            margin-top: 4px;
            font-size: 12px;
            color: var(--error);
        }

        /* 筛选栏 */
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .filter-bar .form-input {
            width: auto;
            min-width: 200px;
        }

        .filter-bar .form-select {
            width: auto;
            min-width: 150px;
        }

        /* 分页 */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
        }

        .pagination-info {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .pagination-buttons {
            display: flex;
            gap: 8px;
        }

        .pagination-btn {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .pagination-btn:hover {
            background-color: var(--bg-tertiary);
        }

        .pagination-btn.active {
            background-color: var(--primary-500);
            color: white;
            border-color: var(--primary-500);
        }

        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 图表容器 */
        .chart-container {
            height: 300px;
            position: relative;
        }

        .chart-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            background-color: var(--bg-tertiary);
            border-radius: 8px;
            color: var(--text-tertiary);
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background-color: var(--bg-primary);
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow: hidden;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
        }

        .modal-close:hover {
            color: var(--text-primary);
            background-color: var(--bg-tertiary);
        }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
            max-height: calc(90vh - 130px);
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            background-color: var(--bg-primary);
            border-radius: 8px;
            box-shadow: var(--shadow-lg);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 300px;
            max-width: 400px;
            transform: translateX(100%);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        .toast.success {
            border-left: 4px solid var(--success);
        }

        .toast.error {
            border-left: 4px solid var(--error);
        }

        .toast.warning {
            border-left: 4px solid var(--warning);
        }

        .toast.info {
            border-left: 4px solid var(--info);
        }

        .toast-icon {
            font-size: 20px;
        }

        .toast.success .toast-icon {
            color: var(--success);
        }

        .toast.error .toast-icon {
            color: var(--error);
        }

        .toast.warning .toast-icon {
            color: var(--warning);
        }

        .toast.info .toast-icon {
            color: var(--info);
        }

        .toast-content {
            flex: 1;
        }

        .toast-title {
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .toast-message {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .toast-close {
            background: none;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            padding: 4px;
        }

        .toast-close:hover {
            color: var(--text-primary);
        }

        /* 加载状态 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary-500);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

    <!-- Toast 容器 -->

    <script>
        // 应用状态
        const state = {
            currentPage: 'dashboard',
            sidebarCollapsed: false,
            theme: 'light',
            merchants: [],
            orders: [],
            settlements: [],
            logs: [],
            currentMerchant: null,
            token: localStorage.getItem('admin_token') || null,
            user: JSON.parse(localStorage.getItem('admin_user') || 'null')
        };

        // Token 管理
        function getToken() {
            return state.token;
        }

        function setAuth(token, user) {
            state.token = token;
            state.user = user;
            localStorage.setItem('admin_token', token);
            localStorage.setItem('admin_user', JSON.stringify(user));
        }

        function clearAuth() {
            state.token = null;
            state.user = null;
            localStorage.removeItem('admin_token');
            localStorage.removeItem('admin_user');
        }

        function isLoggedIn() {
            return !!state.token;
        }

        // 登录页面
        function renderLogin() {
            return `<div style="min-height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; background: var(--bg-secondary); padding: 20px;">
                <div class="card fade-in" style="width: 100%; max-width: 420px; margin: auto;">
                    <div class="card-body" style="padding: 40px;">
                        <div style="text-align: center; margin-bottom: 32px;">
                            <div style="width: 64px; height: 64px; margin: 0 auto 16px; background: var(--primary-50); border-radius: 16px; display: flex; align-items: center; justify-content: center;">
                                <i class="ri-bank-card-line" style="font-size: 32px; color: var(--primary-500);"></i>
                            </div>
                            <h1 style="font-size: 24px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px;">Teaven Pay</h1>
                            <p style="font-size: 14px; color: var(--text-secondary);">管理后台登录</p>
                        </div>
                        <form id="loginForm" onsubmit="handleLogin(event)">
                            <div class="form-group">
                                <label class="form-label">用户名</label>
                                <input type="text" class="form-input" id="loginUsername" placeholder="请输入管理员用户名" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">密码</label>
                                <input type="password" class="form-input" id="loginPassword" placeholder="请输入密码" required>
                            </div>
                            <div id="loginError" style="display: none; color: var(--error); font-size: 13px; margin-bottom: 12px;"></div>
                            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 8px;" id="loginBtn">登录</button>
                        </form>
                    </div>
                </div>
            </div>`;
        }

        // 处理登录
        async function handleLogin(event) {
            event.preventDefault();
            var username = document.getElementById('loginUsername').value;
            var password = document.getElementById('loginPassword').value;
            var errorEl = document.getElementById('loginError');
            var btnEl = document.getElementById('loginBtn');

            errorEl.style.display = 'none';
            btnEl.disabled = true;
            btnEl.textContent = '登录中...';

            try {
                var response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ username, password })
                });
                var data = await response.json();

                if (data.code === 0) {
                    setAuth(data.data.token, data.data.user);
                    // 重新加载页面以恢复完整布局
                    window.location.reload();
                } else {
                    errorEl.textContent = data.msg || '登录失败';
                    errorEl.style.display = 'block';
                }
            } catch (error) {
                errorEl.textContent = '网络错误，请重试';
                errorEl.style.display = 'block';
            } finally {
                btnEl.disabled = false;
                btnEl.textContent = '登录';
            }
        }

        // 退出登录
        function handleLogout() {
            clearAuth();
            navigateTo('login');
        }

        // API 服务
        const api = {
            // 通用请求方法
            async request(url, options = {}) {
                const token = getToken();
                const headers = options.headers || {};
                if (token) {
                    headers['Authorization'] = 'Bearer ' + token;
                }
                const response = await fetch(url, { ...options, headers });
                // HTTP 401 直接判定为登录失效
                if (response.status === 401) {
                    clearAuth();
                    navigateTo('login');
                    throw new Error('登录已过期，请重新登录');
                }
                // 兼容后端业务码：code === -2 表示未授权/Token 失效/权限不足
                // 管理后台中此类情况一律回到登录页
                if (response.status === 403 || response.status === 200) {
                    let bizCode = null;
                    try {
                        const clone = response.clone();
                        const data = await clone.json();
                        bizCode = data && typeof data.code !== 'undefined' ? data.code : null;
                    } catch (e) {
                        // 非 JSON 响应，忽略
                    }
                    if (bizCode === -2) {
                        clearAuth();
                        navigateTo('login');
                        throw new Error('登录已失效，请重新登录');
                    }
                }
                return response;
            },

            // 获取统计数据
            async getStats() {
                try {
                    const response = await this.request('/api/admin/stats');
                    const data = await response.json();
                    if (data.code === 1) {
                        return data.data;
                    }
                    throw new Error(data.msg || '获取统计数据失败');
                } catch (error) {
                    console.error('获取统计数据失败:', error);
                    throw error;
                }
            },

            // 获取商户列表
            async getMerchants(params = {}) {
                try {
                    const queryString = new URLSearchParams(params).toString();
                    const response = await this.request(`/api/admin/merchants?${queryString}`);
                    const data = await response.json();
                    if (data.code === 1) {
                        return { count: data.count, data: data.data };
                    }
                    throw new Error(data.msg || '获取商户列表失败');
                } catch (error) {
                    console.error('获取商户列表失败:', error);
                    throw error;
                }
            },

            // 获取商户详情
            async getMerchantDetail(id) {
                try {
                    const response = await this.request(`/api/admin/merchants/${id}`);
                    const data = await response.json();
                    if (data.code === 1) {
                        return { success: true, data: data.data };
                    }
                    throw new Error(data.msg || '获取商户详情失败');
                } catch (error) {
                    console.error('获取商户详情失败:', error);
                    return { success: false, message: error.message };
                }
            },

            // 更新商户信息
            async updateMerchant(id, merchantData) {
                try {
                    const response = await this.request(`/api/admin/merchants/${id}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: new URLSearchParams(merchantData)
                    });
                    const data = await response.json();
                    if (data.code === 0) {
                        return { success: true, message: data.msg };
                    }
                    throw new Error(data.msg || '更新商户信息失败');
                } catch (error) {
                    console.error('更新商户信息失败:', error);
                    return { success: false, message: error.message };
                }
            },

            // 创建商户
            async createMerchant(merchantData) {
                try {
                    const response = await this.request('/api/admin/merchants', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: new URLSearchParams(merchantData)
                    });
                    const data = await response.json();
                    if (data.code === 0) {
                        return { success: true, data: data.data };
                    }
                    throw new Error(data.msg || '创建商户失败');
                } catch (error) {
                    console.error('创建商户失败:', error);
                    return { success: false, message: error.message };
                }
            },

            // 更新商户状态
            async updateMerchantStatus(id, status) {
                try {
                    const response = await this.request(`/api/admin/merchants/${id}/status`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: new URLSearchParams({ status })
                    });
                    const data = await response.json();
                    if (data.code === 0) {
                        return { success: true };
                    }
                    throw new Error(data.msg || '更新状态失败');
                } catch (error) {
                    console.error('更新状态失败:', error);
                    return { success: false, message: error.message };
                }
            },

            // 获取订单列表
            async getOrders(params = {}) {
                try {
                    const queryString = new URLSearchParams(params).toString();
                    const response = await this.request(`/api/admin/orders?${queryString}`);
                    const data = await response.json();
                    if (data.code === 1) {
                        return { data: data.data };
                    }
                    throw new Error(data.msg || '获取订单列表失败');
                } catch (error) {
                    console.error('获取订单列表失败:', error);
                    throw error;
                }
            },

            // 获取结算列表
            async getSettlements(params = {}) {
                try {
                    const queryString = new URLSearchParams(params).toString();
                    const response = await this.request(`/api/admin/settlements?${queryString}`);
                    const data = await response.json();
                    if (data.code === 1) {
                        return { data: data.data };
                    }
                    throw new Error(data.msg || '获取结算列表失败');
                } catch (error) {
                    console.error('获取结算列表失败:', error);
                    throw error;
                }
            },

            // 处理结算
            async processSettlement(id, action, reason = '') {
                try {
                    const response = await this.request(`/api/admin/settlements/${id}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: new URLSearchParams({ action, reason })
                    });
                    const data = await response.json();
                    if (data.code === 0) {
                        return { success: true, message: data.msg };
                    }
                    throw new Error(data.msg || '处理结算失败');
                } catch (error) {
                    console.error('处理结算失败:', error);
                    return { success: false, message: error.message };
                }
            },

            // 获取系统配置
            async getConfig() {
                try {
                    const response = await this.request('/api/admin/config');
                    const data = await response.json();
                    if (data.code === 1) {
                        return { success: true, data: data.data };
                    }
                    throw new Error(data.msg || '获取配置失败');
                } catch (error) {
                    console.error('获取配置失败:', error);
                    return { success: false, message: error.message };
                }
            },

            // 更新系统配置
            async updateConfig(configData) {
                try {
                    const response = await this.request('/api/admin/config', {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: new URLSearchParams(configData)
                    });
                    const data = await response.json();
                    if (data.code === 0) {
                        return { success: true };
                    }
                    throw new Error(data.msg || '更新配置失败');
                } catch (error) {
                    console.error('更新配置失败:', error);
                    return { success: false, message: error.message };

            // 获取支付方式列表
            async getPaymentTypes() {
                try {
                    const response = await this.request('/api/admin/payment-types');

                    if (data.code === 1) {
                        return { data: data.data };

            // 获取支付通道列表
            async getChannels() {
                try {
                    const response = await this.request('/api/admin/channels');
                    const data = await response.json();
                    if (data.code === 1) {
                        return { data: data.data };

                    console.error('获取支付通道失败:', error);

            // 获取操作日志列表
            async getLogs(params = {}) {
                try {
                    const queryString = new URLSearchParams(params).toString();
                    const response = await this.request(`/api/admin/logs?${queryString}`);
                    const data = await response.json();
                    if (data.code === 1) {
                        return { data: data.data };
                    }
                    throw new Error(data.msg || '获取操作日志失败');
                } catch (error) {
                    console.error('获取操作日志失败:', error);
                    throw error;
                }
            }
        };

        // 工具函数
        function formatMoney(amount) {
            if (typeof amount !== 'number' || isNaN(amount)) return '¥0.00';
            return '¥' + amount.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            return dateStr;
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function copyToClipboard(text) {
            if (!text) {
                showToast('warning', '复制失败', '没有可复制的内容');
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                showToast('success', '复制成功', '内容已复制到剪贴板');
            }).catch(() => {
                showToast('error', '复制失败', '请手动复制');
            });
        }

        function getStatusBadge(status, type) {
            const statusMap = {
                order: {
                    0: { text: '未支付', class: 'default' },
                    1: { text: '已支付', class: 'success' },
                    2: { text: '已退款', class: 'warning' },
                    3: { text: '已关闭', class: 'error' }
                },
                merchant: {
                    0: { text: '已禁用', class: 'error' },
                    1: { text: '正常', class: 'success' },
                    2: { text: '待审核', class: 'warning' }
                },
                settlement: {
                    0: { text: '待处理', class: 'warning' },
                    1: { text: '已处理', class: 'info' },
                    2: { text: '已批准', class: 'success' },
                    3: { text: '已拒绝', class: 'error' }
                }
            };
            const info = statusMap[type][status] || { text: '未知', class: 'default' };
            return `<span class="badge ${info.class}">${info.text}</span>`;
        }

        function getPaymentTypeIcon(type) {
            const icons = {
                alipay: 'ri-alipay-line',
                wxpay: 'ri-wechat-pay-line',
                qqpay: 'ri-qq-line'
            };
            return icons[type] || 'ri-bank-card-line';
        }

        function getPaymentTypeName(type) {
            const names = {
                alipay: '支付宝',
                wxpay: '微信支付',
                qqpay: 'QQ钱包'
            };
            return names[type] || type;
        }

        // Toast 通知
        function showToast(type, title, message) {
            const container = document.getElementById('toastContainer');
            const icons = {
                success: 'ri-check-line',
                error: 'ri-error-warning-line',
                warning: 'ri-alert-line',
                info: 'ri-information-line'
            };

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="${icons[type]} toast-icon"></i>
                <div class="toast-content">
                    <div class="toast-title">${title}</div>
                    <div class="toast-message">${message}</div>
                </div>
                <button class="toast-close" onclick="this.parentElement.remove()">
                    <i class="ri-close-line"></i>
                </button>
            `;

            container.appendChild(toast);

            // 显示动画
            setTimeout(() => toast.classList.add('show'), 10);

            // 自动消失
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // 确认对话框
        function showConfirm(title, message, onConfirm, onCancel = null) {
            const confirmHTML = `
                <div class="modal-overlay" id="confirmOverlay">
                    <div class="modal" style="max-width: 400px;">
                        <div class="modal-header">
                            <span class="modal-title">${title}</span>
                            <button class="modal-close" onclick="closeConfirm(false)">
                                <i class="ri-close-line"></i>
                            </button>
                        </div>
                        <div class="modal-body">
                            <p style="color: var(--text-secondary);">${message}</p>
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-secondary" onclick="closeConfirm(false)">取消</button>
                            <button class="btn btn-danger" onclick="closeConfirm(true)">确认</button>
                        </div>
                    </div>
                </div>
            `;

            document.body.insertAdjacentHTML('beforeend', confirmHTML);
            setTimeout(() => {
                const overlay = document.getElementById('confirmOverlay');
                if (overlay) overlay.classList.add('active');
            }, 10);

            // 存储回调函数
            window.confirmCallback = { onConfirm, onCancel };
        }

        // 关闭确认对话框
        function closeConfirm(confirmed) {
            const overlay = document.getElementById('confirmOverlay');
            if (overlay) {
                overlay.classList.remove('active');
                setTimeout(() => overlay.remove(), 300);
            }

            // 执行回调
            if (window.confirmCallback) {
                if (confirmed && window.confirmCallback.onConfirm) {
                    window.confirmCallback.onConfirm();
                } else if (!confirmed && window.confirmCallback.onCancel) {
                    window.confirmCallback.onCancel();
                }
                window.confirmCallback = null;
            }
        }

        // 抽屉组件
        function showDrawer(title, content, options = {}) {
            const { width = '400px', position = 'right' } = options;
            const drawerHTML = `
                <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()">
                    <div class="drawer" style="width: ${width}; position: fixed; top: 0; ${position}: 0; bottom: 0; background: var(--bg-primary); box-shadow: var(--shadow-lg); z-index: 1001; transform: translateX(100%); transition: transform 0.3s ease;" onclick="event.stopPropagation()">
                        <div style="padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between;">
                            <span style="font-size: 18px; font-weight: 600; color: var(--text-primary);">${title}</span>
                            <button class="btn btn-icon btn-secondary" onclick="closeDrawer()">
                                <i class="ri-close-line"></i>
                            </button>
                        </div>
                        <div style="padding: 20px; overflow-y: auto; height: calc(100% - 80px);">
                            ${content}
                        </div>
                    </div>
                </div>
            `;

            document.body.insertAdjacentHTML('beforeend', drawerHTML);
            setTimeout(() => {
                const overlay = document.getElementById('drawerOverlay');
                const drawer = document.querySelector('.drawer');
                if (overlay) overlay.classList.add('active');
                if (drawer) drawer.style.transform = 'translateX(0)';
            }, 10);
        }

        // 关闭抽屉
        function closeDrawer() {
            const overlay = document.getElementById('drawerOverlay');
            const drawer = document.querySelector('.drawer');
            if (drawer) {
                drawer.style.transform = 'translateX(100%)';
            }
            if (overlay) {
                overlay.classList.remove('active');
                setTimeout(() => overlay.remove(), 300);
            }
        }

        // 提交商户编辑
        async function submitMerchantEdit() {
            const merchant = state.currentMerchant;
            if (!merchant) {
                showToast('error', '保存失败', '商户信息未加载');
                return;
            }

            const submitBtn = document.getElementById('editMerchantSubmitBtn');
            if (submitBtn) {
                submitBtn.disabled = true;
                submitBtn.textContent = '保存中...';
            }

            const merchantData = {
                email: document.getElementById('editMerchantEmail')?.value || '',
                contactQq: document.getElementById('editMerchantContactQq')?.value || '',
                contactWechat: document.getElementById('editMerchantContactWechat')?.value || '',
                notifyUrl: document.getElementById('editMerchantNotifyUrl')?.value || '',
                returnUrl: document.getElementById('editMerchantReturnUrl')?.value || '',
                groupId: document.getElementById('editMerchantGroupId')?.value || ''
            };

            try {
                const result = await api.updateMerchant(merchant.id, merchantData);
                if (result.success) {
                    showToast('success', '保存成功', result.message || '商户信息已更新');
                    closeModal();
                    navigateToMerchantDetail(merchant.id);
                } else {
                    showToast('error', '保存失败', result.message);
                }
            } catch (error) {
                showToast('error', '保存失败', '网络错误，请重试');
            } finally {
                if (submitBtn) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = '保存';
                }
            }
        }

            const actionText = status === 1 ? '启用' : '禁用';
            showConfirm(`确认${actionText}商户`, `确定要${actionText}该商户吗？`, async () => {
                try {
                    const result = await api.updateMerchantStatus(id, status);
                    if (result.success) {
                        showToast('success', '操作成功', `商户已${actionText}`);
                        navigateToMerchantDetail(id);
                    } else {
                        showToast('error', '操作失败', result.message);
                    }
                } catch (error) {
                    showToast('error', '操作失败', '网络错误，请重试');
                }
            });
        }

                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                        <div class="pagination">
                            <div class="pagination-info">共 ${logs.length} 条记录</div>
                            <div class="pagination-buttons">
                                <button class="pagination-btn" disabled>&lt;</button>
                                <button class="pagination-btn active">1</button>
                                <button class="pagination-btn">&gt;</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // 加载仪表盘数据
        async function loadDashboardData() {
            try {
                const stats = await api.getStats();
                
                // 更新统计卡片
                const statValues = document.querySelectorAll('.stat-value');
                if (statValues.length >= 4) {
                    statValues[0].textContent = stats.today.orders.toLocaleString();
                    statValues[1].textContent = formatMoney(stats.today.amount);
                    statValues[2].textContent = formatMoney(stats.today.profit);
                    statValues[3].textContent = stats.merchants.active.toLocaleString();
                }

                // 更新趋势数据
                if (stats.trend && window.trendChart) {
                    window.trendChart.setOption({
                        xAxis: {
                            data: stats.trend.dates || []
                        },
                        series: [{
                            data: stats.trend.amounts || []
                        }]
                    });
                }

                showToast('success', '数据已更新', '仪表盘数据已刷新');
            } catch (error) {
                console.error('加载仪表盘数据失败:', error);
                showToast('error', '加载失败', '无法获取仪表盘数据');
            }
        }

                    axisLine: {

                    },

                },
                yAxis: {

                series: [
                    {

                        barWidth: '60%',
                        data: [],
                        itemStyle: {

                                y2: 1,

        // 页面映射
        const pageRenderers = {
            dashboard: renderDashboard,
            merchants: renderMerchants,
            orders: renderOrders,
            settlements: renderSettlements,
            'payment-types': renderPaymentTypes,
            channels: renderChannels,
            settings: renderSettings,
            logs: renderLogs
        };

        // 导航到商户详情页面
        async function navigateToMerchantDetail(merchantId) {
            state.currentPage = 'merchantDetail';

            // 更新面包屑
            const breadcrumb = document.getElementById('breadcrumbCurrent');
            if (breadcrumb) breadcrumb.textContent = '商户详情';

            // 渲染页面
            const html = await renderMerchantDetail(merchantId);
            if (html) {
                document.getElementById('mainContent').innerHTML = html;
            }

            // 移动端关闭侧边栏
            if (window.innerWidth <= 1024) {
                const sidebar = document.getElementById('sidebar');
                const overlay = document.getElementById('drawerOverlay');
                if (sidebar) sidebar.classList.remove('mobile-open');
                if (overlay) overlay.classList.remove('active');
            }
        }

        // 导航到指定页面
        async function navigateTo(page) {
            state.currentPage = page;

            // 登录页面特殊处理
            if (page === 'login') {
                document.querySelector('.layout').innerHTML = renderLogin();
                return;
            }

            // 更新导航激活状态
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.page === page) {
                    item.classList.add('active');
                }
            });

            // 更新面包屑
            const pageNames = {
                dashboard: '仪表盘',
                merchants: '商户管理',
                orders: '订单管理',
                settlements: '结算管理',
                'payment-types': '支付方式',
                channels: '支付通道',
                settings: '系统配置',
                logs: '操作日志'
            };
            const breadcrumb = document.getElementById('breadcrumbCurrent');
            if (breadcrumb) breadcrumb.textContent = pageNames[page] || page;

            // 渲染页面
            const renderer = pageRenderers[page];
            if (renderer) {
                const html = await renderer();
                document.getElementById('mainContent').innerHTML = html;
            }

            // 初始化图表
            if (page === 'dashboard') {
                try {
                    initCharts();
                } catch (e) {
                    console.error('图表初始化失败:', e);
                }
                loadDashboardData();
            }

            // 移动端关闭侧边栏
            if (window.innerWidth <= 1024) {
                closeSidebar();
            }
        }

        // 侧边栏切换
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            if (!sidebar) return;
            state.sidebarCollapsed = !state.sidebarCollapsed;
            sidebar.classList.toggle('collapsed');
        }

        // 移动端侧边栏
        function openSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('drawerOverlay');
            if (sidebar) sidebar.classList.add('mobile-open');
            if (overlay) overlay.classList.add('active');
        }

        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('drawerOverlay');
            if (sidebar) sidebar.classList.remove('mobile-open');
            if (overlay) overlay.classList.remove('active');
        }

        // 主题切换
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            state.theme = newTheme;
            localStorage.setItem('theme', newTheme);

            // 更新图标
            const icon = document.querySelector('#themeToggle i');
            if (icon) icon.className = newTheme === 'dark' ? 'ri-sun-line' : 'ri-moon-line';
        }

        // 初始化主题
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = savedTheme || (prefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
            state.theme = theme;

            const icon = document.querySelector('#themeToggle i');
            if (icon) icon.className = theme === 'dark' ? 'ri-sun-line' : 'ri-moon-line';
        }

        // 结算处理
        function handleSettlement(id, action) {
            const title = action === 'approve' ? '确认批准结算' : '确认拒绝结算';
            const message = action === 'approve' 
                ? '确定要批准这笔结算申请吗？批准后资金将转出。'
                : '确定要拒绝这笔结算申请吗？拒绝后资金将退回商户余额。';

            showConfirm(title, message, async () => {
                try {
                    const reason = action === 'reject' ? '管理员拒绝' : '';
                    const result = await api.processSettlement(id, action, reason);
                    if (result.success) {
                        showToast('success', '操作成功', result.message);
                        // 刷新页面数据
                        navigateTo('settlements');
                    } else {
                        showToast('error', '操作失败', result.message);
                    }
                } catch (error) {
                    showToast('error', '操作失败', '网络错误，请重试');
                }
            });
        }

        // 注册全局事件监听器（登录前后都需要）
        function setupEventListeners() {
            // 初始化主题
            initTheme();

            // 侧边栏切换按钮
            var sidebarToggle = document.getElementById('sidebarToggle');
            if (sidebarToggle && !sidebarToggle._bound) {
                sidebarToggle._bound = true;
                sidebarToggle.addEventListener('click', function() {
                    if (window.innerWidth <= 1024) {
                        openSidebar();
                    } else {
                        toggleSidebar();
                    }
                });
            }

            // 遮罩层点击
            var drawerOverlay = document.getElementById('drawerOverlay');
            if (drawerOverlay && !drawerOverlay._bound) {
                drawerOverlay._bound = true;
                drawerOverlay.addEventListener('click', closeSidebar);
            }

            // 主题切换
            var themeToggle = document.getElementById('themeToggle');
            if (themeToggle && !themeToggle._bound) {
                themeToggle._bound = true;
                themeToggle.addEventListener('click', toggleTheme);
            }

            // 导航点击
            document.querySelectorAll('.nav-item[data-page]').forEach(function(item) {
                if (!item._bound) {
                    item._bound = true;
                    item.addEventListener('click', function(e) {
                        e.preventDefault();
                        navigateTo(this.dataset.page);
                    });
                }
            });

            // 退出登录按钮
            var logoutBtn = document.querySelector('[data-action="logout"]');
            if (logoutBtn && !logoutBtn._bound) {
                logoutBtn._bound = true;
                logoutBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    handleLogout();
                });
            }

            // 监听系统主题变化
            if (!window._themeListenerBound) {
                window._themeListenerBound = true;
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
                    if (!localStorage.getItem('theme')) {
                        var theme = e.matches ? 'dark' : 'light';
                        document.documentElement.setAttribute('data-theme', theme);
                        state.theme = theme;
                        var icon = document.querySelector('#themeToggle i');
                        if (icon) icon.className = theme === 'dark' ? 'ri-sun-line' : 'ri-moon-line';
                    }
                });
            }

            // 窗口大小变化处理
            if (!window._resizeListenerBound) {
                window._resizeListenerBound = true;
                window.addEventListener('resize', function() {
                    if (window.innerWidth > 1024) {
                        closeSidebar();
                    }
                });
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 先注册事件监听器
            setupEventListeners();

            // 检查登录状态
            if (!isLoggedIn()) {
                navigateTo('login');
                return;
            }

            // 更新用户信息显示
            if (state.user) {
                var avatarEl = document.getElementById('userAvatar');
                var nameEl = document.getElementById('userDisplayName');
                if (avatarEl) avatarEl.textContent = (state.user.username || '管').charAt(0);
                if (nameEl) nameEl.textContent = state.user.username || '管理员';
            }

            // 渲染默认页面
            navigateTo('dashboard');
        });

        // 模态框HTML结构
        function createModalHTML(type) {
            if (type === 'createMerchant') {
                return `
                    <div class="modal-overlay" id="modalOverlay">
                        <div class="modal">
                            <div class="modal-header">
                                <span class="modal-title">创建商户</span>
                                <button class="modal-close" onclick="closeModal()">
                                    <i class="ri-close-line"></i>
                                </button>
                            </div>
                            <div class="modal-body">
                                <div class="form-group">
                                    <label class="form-label">用户名 <span style="color: var(--error);">*</span></label>
                                    <input type="text" class="form-input" id="merchantUsername" placeholder="请输入用户名">
                                    <div class="form-hint">商户登录用户名，需唯一</div>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">邮箱</label>
                                    <input type="email" class="form-input" id="merchantEmail" placeholder="请输入邮箱">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">密码 <span style="color: var(--error);">*</span></label>
                                    <input type="password" class="form-input" id="merchantPassword" placeholder="请输入密码">
                                    <div class="form-hint">密码长度至少8位</div>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">确认密码 <span style="color: var(--error);">*</span></label>
                                    <input type="password" class="form-input" id="merchantConfirmPassword" placeholder="请再次输入密码">
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                                <button class="btn btn-primary" onclick="submitMerchant()">创建</button>
                            </div>
                        </div>
                    </div>
                `;
            }
            return '';
        }

        // 显示模态框
        function showModal(type) {
            const modalHTML = createModalHTML(type);
            if (modalHTML) {
                document.body.insertAdjacentHTML('beforeend', modalHTML);
                setTimeout(() => {
                    const overlay = document.getElementById('modalOverlay');
                    if (overlay) overlay.classList.add('active');
                }, 10);
            }
        }

        // 关闭模态框
        function closeModal() {
            const overlay = document.getElementById('modalOverlay');
            if (overlay) {
                overlay.classList.remove('active');
                setTimeout(() => overlay.remove(), 300);
            }
        }

        // 提交商户表单
        function submitMerchant() {
            const username = document.getElementById('merchantUsername').value;
            const email = document.getElementById('merchantEmail').value;
            const password = document.getElementById('merchantPassword').value;
            const confirmPassword = document.getElementById('merchantConfirmPassword').value;

            // 表单验证
            if (!username) {
                showToast('error', '验证失败', '用户名不能为空');
                return;
            }
            if (!password) {
                showToast('error', '验证失败', '密码不能为空');
                return;
            }
            if (password.length < 8) {
                showToast('error', '验证失败', '密码长度至少8位');
                return;
            }
            if (password !== confirmPassword) {
                showToast('error', '验证失败', '两次密码输入不一致');
                return;
            }

            // 模拟API调用
            showToast('success', '创建成功', '商户 ' + username + ' 已成功创建');
            closeModal();
        }
    </script>
</body>
</html>
